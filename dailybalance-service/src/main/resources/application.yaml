server:
  port: 8081
  servlet:
    context-path: /dailybalance-service

spring:
  application:
    name: dailybalance-service
  profiles:
    active: dev  # Define um perfil ativo

  datasource:
    url: jdbc:postgresql://localhost:5433/dailybalance_db
    username: dailybalance_user
    password: dailybalance_password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 900000

  # Inicialização do esquema SQL
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  # Desabilitar JPA completamente
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:local-project}

# Configurações de observabilidade
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99

# Informações da aplicação para o actuator e banner
info:
  app:
    name: Daily Balance Service
    description: Serviço para geração de saldos consolidados diários
    version: ${project.version:1.0.0-SNAPSHOT}
    encoding: UTF-8
    java:
      version: ${java.version}

pubsub:
  subscriptions:
    transaction-events: dailybalance-transaction-subscription
  dlq:
    transaction-events: transaction-events-dlq-sub
    max-delivery-attempts: 5

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs

# Configuração do Circuit Breaker com Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      default:
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5000
        slidingWindowType: COUNT_BASED
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1000
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

# Configurações de Logging
logging:
  level:
    root: WARN
    com.carrefourbank: INFO
    org.springframework.web: INFO
    org.springframework.jdbc.core: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr([${spring.application.name},%X{traceId:-},%X{spanId:-},%X{balanceId:-}]){yellow} %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name},%X{traceId:-},%X{spanId:-},%X{balanceId:-}] ${PID:- } --- [%t] %-40.40logger{39} : %m%n%wEx"
  file:
    name: logs/dailybalance-service.log
    max-size: 10MB
    max-history: 30