# Configuração para ambiente de testes (Sem JPA)
spring:
  # Configuração de banco de dados H2 em memória
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # Configuração do H2 console (opcional, útil para depuração)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Inicialização do schema para testes
  sql:
    init:
      mode: embedded
      schema-locations: classpath:schema-test.sql

  # Desativar JPA, GCP e UserDetailsService desnecessários em testes
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  # Desativar Pub/Sub para testes unitários
  cloud:
    gcp:
      pubsub:
        enabled: false

# Configurações específicas para testes
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# Configuração de logging para testes
logging:
  level:
    root: WARN
    com.carrefourbank: DEBUG
    org.springframework.jdbc.core: DEBUG
    org.springframework.test: INFO
    org.h2: INFO

app:
  security:
    api-key: test-api-key

# Desativar Circuit Breaker para testes
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: false
  retry:
    configs:
      default:
        maxAttempts: 1  # Evita retentativas em testes