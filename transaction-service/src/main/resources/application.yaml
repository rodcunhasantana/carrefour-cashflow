# application.yml - Configurações comuns
server:
  port: 8080
  servlet:
    context-path: /transaction-service

spring:
  application:
    name: transaction-service
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/transaction_db
    username: transaction_user
    password: transaction_password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 900000

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:local-project}

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

info:
  app:
    name: Transaction Service
    description: Serviço de controle de transações financeiras
    version: ${project.version:1.0.0-SNAPSHOT}
    encoding: UTF-8
    java:
      version: ${java.version}

application:
  formatted-version: "@project.version@"

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99

app:
  security:
    api-key: ${APP_API_KEY:cashflow-dev-key}

pubsub:
  subscriptions:
    period-closed: transaction-period-subscription
  dlq:
    period-closed: period-events-dlq-sub
    max-delivery-attempts: 5

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs

resilience4j:
  circuitbreaker:
    instances:
      default:
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5000
        slidingWindowType: COUNT_BASED
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1000
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

logging:
  level:
    root: WARN
    com.carrefourbank: INFO
    org.springframework.web: INFO
    org.springframework.jdbc.core: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr([${spring.application.name},%X{traceId:-},%X{spanId:-},%X{transactionId:-}]){yellow} %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name},%X{traceId:-},%X{spanId:-},%X{transactionId:-}] ${PID:- } --- [%t] %-40.40logger{39} : %m%n%wEx"
  file:
    name: logs/transaction-service.log
    max-size: 10MB
    max-history: 30
