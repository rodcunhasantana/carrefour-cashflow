version: '3.8'

services:

  # ─── Banco de dados do transaction-service ──────────────────────────────────
  transaction-db:
    image: postgres:15-alpine
    container_name: transaction-db
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: transaction_user
      POSTGRES_PASSWORD: transaction_password
    ports:
      - "5432:5432"
    volumes:
      - transaction-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_user -d transaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Banco de dados do dailybalance-service ──────────────────────────────────
  dailybalance-db:
    image: postgres:15-alpine
    container_name: dailybalance-db
    environment:
      POSTGRES_DB: dailybalance_db
      POSTGRES_USER: dailybalance_user
      POSTGRES_PASSWORD: dailybalance_password
    ports:
      - "5433:5432"
    volumes:
      - dailybalance-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailybalance_user -d dailybalance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Google Cloud Pub/Sub Emulator ───────────────────────────────────────────
  # Imagem oficial leve (apenas o emulador, sem o SDK completo)
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: pubsub-emulator
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=local-project
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── Criação do tópico e subscription no emulador ───────────────────────────
  # Roda uma vez e sai após criar o tópico e a subscription necessários
  pubsub-setup:
    image: curlimages/curl:latest
    container_name: pubsub-setup
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        # ── Tópicos principais ────────────────────────────────────────────────
        echo "Criando tópico transaction-events..."
        curl -s -X PUT "http://pubsub-emulator:8085/v1/projects/local-project/topics/transaction-events"
        echo "Criando tópico period-events..."
        curl -s -X PUT "http://pubsub-emulator:8085/v1/projects/local-project/topics/period-events"

        # ── Tópicos DLQ (Dead Letter) ─────────────────────────────────────────
        echo "Criando tópico DLQ transaction-events-dlq..."
        curl -s -X PUT "http://pubsub-emulator:8085/v1/projects/local-project/topics/transaction-events-dlq"
        echo "Criando tópico DLQ period-events-dlq..."
        curl -s -X PUT "http://pubsub-emulator:8085/v1/projects/local-project/topics/period-events-dlq"

        # ── Subscriptions principais com deadLetterPolicy ─────────────────────
        echo "Criando subscription dailybalance-transaction-subscription (com DLQ)..."
        curl -s -X PUT "http://pubsub-emulator:8085/v1/projects/local-project/subscriptions/dailybalance-transaction-subscription" \
          -H "Content-Type: application/json" \
          -d '{
            "topic": "projects/local-project/topics/transaction-events",
            "ackDeadlineSeconds": 30,
            "deadLetterPolicy": {
              "deadLetterTopic": "projects/local-project/topics/transaction-events-dlq",
              "maxDeliveryAttempts": 5
            }
          }'
        echo "Criando subscription transaction-period-subscription (com DLQ)..."
        curl -s -X PUT "http://pubsub-emulator:8085/v1/projects/local-project/subscriptions/transaction-period-subscription" \
          -H "Content-Type: application/json" \
          -d '{
            "topic": "projects/local-project/topics/period-events",
            "ackDeadlineSeconds": 30,
            "deadLetterPolicy": {
              "deadLetterTopic": "projects/local-project/topics/period-events-dlq",
              "maxDeliveryAttempts": 5
            }
          }'

        # ── Subscriptions de monitoramento das DLQs ───────────────────────────
        echo "Criando subscription transaction-events-dlq-sub..."
        curl -s -X PUT "http://pubsub-emulator:8085/v1/projects/local-project/subscriptions/transaction-events-dlq-sub" \
          -H "Content-Type: application/json" \
          -d '{"topic":"projects/local-project/topics/transaction-events-dlq"}'
        echo "Criando subscription period-events-dlq-sub..."
        curl -s -X PUT "http://pubsub-emulator:8085/v1/projects/local-project/subscriptions/period-events-dlq-sub" \
          -H "Content-Type: application/json" \
          -d '{"topic":"projects/local-project/topics/period-events-dlq"}'

        echo "Setup concluído."

  # ─── Transaction Service ─────────────────────────────────────────────────────
  transaction-service:
    build:
      # Contexto é a raiz do projeto (precisa do pom.xml pai e do módulo common)
      context: ../../
      dockerfile: transaction-service/Dockerfile
    container_name: transaction-service
    depends_on:
      transaction-db:
        condition: service_healthy
      pubsub-setup:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: transaction-db
      DB_PORT: 5432
      DB_USER: transaction_user
      DB_PASSWORD: transaction_password
      GCP_PROJECT_ID: local-project
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      APP_API_KEY: cashflow-local-key
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/transaction-service/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Daily Balance Service ──────────────────────────────────────────────────
  dailybalance-service:
    build:
      context: ../../
      dockerfile: dailybalance-service/Dockerfile
    container_name: dailybalance-service
    depends_on:
      dailybalance-db:
        condition: service_healthy
      pubsub-setup:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: dailybalance-db
      DB_PORT: 5432
      DB_USER: dailybalance_user
      DB_PASSWORD: dailybalance_password
      GCP_PROJECT_ID: local-project
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      APP_API_KEY: cashflow-local-key
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/dailybalance-service/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  transaction-data:
  dailybalance-data:
